{% extends "base.html" %}

{% block title %}Страница не найдена (404){% endblock %}

{% block content %}
<div class="glass-card" style="text-align: center; max-width: 600px; margin: 50px auto; padding: 50px;">
    <div style="font-size: 80px; color: var(--text-light); margin-bottom: 20px;">
        <i class="fa-solid fa-route"></i>
    </div>
    <h1 style="font-size: 36px; font-weight: 800; color: var(--primary-green); margin-bottom: 10px;">404</h1>
    <h2 style="font-size: 24px; font-weight: 700; margin-bottom: 15px;">Страница не найдена</h2>
    <p style="color: var(--text-secondary); margin-bottom: 30px; font-size: 15px; line-height: 1.6;">
        Похоже, мы не можем найти нужную вам страницу. Возможно, она была удалена или вы перешли по устаревшей ссылке.
    </p>
    <a href="{{ url_for('index') }}" class="btn btn-primary" style="padding: 12px 30px;">
        <i class="fa-solid fa-house"></i> На главную
    </a>
</div>
{% endblock %}
