{% extends "base.html" %}

{% block title %}Внутренняя ошибка сервера (500){% endblock %}

{% block content %}
<div class="glass-card" style="text-align: center; max-width: 600px; margin: 50px auto; padding: 50px;">
    <div style="font-size: 80px; color: var(--text-light); margin-bottom: 20px;">
        <i class="fa-solid fa-triangle-exclamation"></i>
    </div>
    <h1 style="font-size: 36px; font-weight: 800; color: #ef4444; margin-bottom: 10px;">500</h1>
    <h2 style="font-size: 24px; font-weight: 700; margin-bottom: 15px;">Ошибка сервера</h2>
    <p style="color: var(--text-secondary); margin-bottom: 30px; font-size: 15px; line-height: 1.6;">
        Произошла непредвиденная ошибка на сервере. Мы уже работаем над её устранением. Пожалуйста, попробуйте повторить действие позже.
    </p>
    <a href="{{ url_for('index') }}" class="btn btn-primary" style="padding: 12px 30px;">
        <i class="fa-solid fa-house"></i> На главную
    </a>
</div>
{% endblock %}
