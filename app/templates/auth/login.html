{% extends "base.html" %}

{% block title %}Вход{% endblock %}

{% block content %}
<div style="max-width: 450px; margin: 40px auto;">
    <div class="glass-card" style="text-align: center;">
        <i class="fa-solid fa-lock" style="font-size: 36px; color: var(--primary-green); margin-bottom: 15px;"></i>
        <h2 style="margin-bottom: 25px; font-weight: 700;">Вход в систему</h2>
        
        <form action="{{ url_for('auth.login') }}" method="POST">
            <div class="form-group">
                <label for="email" class="form-label">Корпоративный Email</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="username@example.com" required>
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">Пароль</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            
            <div class="form-check">
                <input type="checkbox" id="remember" name="remember">
                <label for="remember" style="font-size: 13px; color: var(--text-secondary); cursor: pointer;">Запомнить меня на этом устройстве</label>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px; padding: 12px;">Войти</button>
        </form>
        
        <div style="margin-top: 20px; font-size: 13px; color: var(--text-secondary);">
            Нет аккаунта? <a href="{{ url_for('auth.register') }}" style="color: var(--primary-green); text-decoration: none; font-weight: 600;">Зарегистрироваться</a>
        </div>
    </div>
</div>
{% endblock %}
