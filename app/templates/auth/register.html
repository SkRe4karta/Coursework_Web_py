{% extends "base.html" %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 40px auto;">
    <div class="glass-card" style="text-align: center;">
        <i class="fa-solid fa-user-plus" style="font-size: 36px; color: var(--primary-green); margin-bottom: 15px;"></i>
        <h2 style="margin-bottom: 25px; font-weight: 700;">Регистрация сотрудника</h2>
        
        <form action="{{ url_for('auth.register') }}" method="POST">
            <div class="form-group">
                <label for="full_name" class="form-label">ФИО</label>
                <input type="text" id="full_name" name="full_name" class="form-control" placeholder="Иванов Иван Иванович" required>
            </div>
            
            <div class="form-group">
                <label for="email" class="form-label">Корпоративный Email</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="user@example.com" required>
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">Пароль</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Минимум 6 символов" minlength="6" required>
            </div>
            
            <div class="form-group">
                <label for="confirm_password" class="form-label">Подтверждение пароля</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="Повторите пароль" minlength="6" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px; padding: 12px;">Зарегистрироваться</button>
        </form>
        
        <div style="margin-top: 20px; font-size: 13px; color: var(--text-secondary);">
            Уже есть аккаунт? <a href="{{ url_for('auth.login') }}" style="color: var(--primary-green); text-decoration: none; font-weight: 600;">Войти</a>
        </div>
    </div>
</div>
{% endblock %}
