{% extends "base.html" %}

{% block title %}Создание администратора{% endblock %}

{% block content %}
<div style="max-width: 650px; margin: 0 auto;">
    <div style="margin-bottom: 20px;">
        <a href="{{ url_for('root.dashboard') }}" style="color: var(--primary-green); text-decoration: none; font-weight: 500;">
            <i class="fa-solid fa-arrow-left"></i> Назад в панель Root
        </a>
    </div>

    <div class="glass-card">
        <h2 style="font-weight: 700; margin-bottom: 25px;"><i class="fa-solid fa-user-shield" style="color: var(--primary-green);"></i> Создание нового администратора</h2>
        
        <form action="{{ url_for('root.create_admin') }}" method="POST">
            <!-- Account credentials -->
            <div class="form-group">
                <label for="full_name" class="form-label">ФИО *</label>
                <input type="text" id="full_name" name="full_name" class="form-control" placeholder="Петров Петр Петрович" required>
            </div>
            
            <div class="form-group">
                <label for="email" class="form-label">Email-адрес *</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="admin2@example.com" required>
            </div>
            
            <div style="display: flex; gap: 20px; flex-wrap: wrap;">
                <div class="form-group" style="flex: 1; min-width: 200px;">
                    <label for="password" class="form-label">Пароль *</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" minlength="6" required>
                </div>
                <div class="form-group" style="flex: 1; min-width: 200px;">
                    <label for="confirm_password" class="form-label">Подтверждение пароля *</label>
                    <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="••••••••" minlength="6" required>
                </div>
            </div>

            <!-- Granular privileges -->
            <div style="margin: 25px 0; border-top: 1px solid rgba(0,0,0,0.06); padding-top: 20px;">
                <h3 style="font-size: 15px; font-weight: 700; margin-bottom: 15px;">Настройка прав доступа</h3>
                
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 10px;">
                    <div class="form-check">
                        <input type="checkbox" id="can_manage_rooms" name="can_manage_rooms" checked>
                        <label for="can_manage_rooms" style="font-size: 13px; color: var(--text-secondary); cursor: pointer;">Управление комнатами</label>
                    </div>
                    
                    <div class="form-check">
                        <input type="checkbox" id="can_manage_bookings" name="can_manage_bookings" checked>
                        <label for="can_manage_bookings" style="font-size: 13px; color: var(--text-secondary); cursor: pointer;">Управление бронями</label>
                    </div>
                    
                    <div class="form-check">
                        <input type="checkbox" id="can_manage_users" name="can_manage_users">
                        <label for="can_manage_users" style="font-size: 13px; color: var(--text-secondary); cursor: pointer;">Блокировка пользователей</label>
                    </div>
                    
                    <div class="form-check">
                        <input type="checkbox" id="can_view_analytics" name="can_view_analytics" checked>
                        <label for="can_view_analytics" style="font-size: 13px; color: var(--text-secondary); cursor: pointer;">Просмотр аналитики</label>
                    </div>
                    
                    <div class="form-check">
                        <input type="checkbox" id="can_export_reports" name="can_export_reports" checked>
                        <label for="can_export_reports" style="font-size: 13px; color: var(--text-secondary); cursor: pointer;">Экспорт PDF / CSV отчетов</label>
                    </div>
                    
                    <div class="form-check">
                        <input type="checkbox" id="can_view_audit_logs" name="can_view_audit_logs" checked>
                        <label for="can_view_audit_logs" style="font-size: 13px; color: var(--text-secondary); cursor: pointer;">Просмотр журналов аудита</label>
                    </div>
                </div>
            </div>
            
            <div style="display: flex; gap: 15px; margin-top: 30px;">
                <button type="submit" class="btn btn-primary" style="flex: 1; padding: 12px;">Создать профиль</button>
                <a href="{{ url_for('root.dashboard') }}" class="btn btn-secondary" style="flex: 1; padding: 12px; text-align: center;">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
